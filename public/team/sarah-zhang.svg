<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a1f3e"/>
      <stop offset="100%" stop-color="#0f0a1f"/>
    </radialGradient>
    <linearGradient id="gold3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a853"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg3)"/>
  <!-- Face -->
  <ellipse cx="100" cy="88" rx="34" ry="40" fill="#f0d5b8"/>
  <!-- Hair - long straight -->
  <ellipse cx="100" cy="60" rx="42" ry="24" fill="#1a1a2e"/>
  <path d="M58 60 Q58 130 65 150" stroke="#1a1a2e" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M142 60 Q142 130 135 150" stroke="#1a1a2e" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Bangs -->
  <path d="M70 60 Q85 72 100 60 Q115 72 130 60" fill="#1a1a2e"/>
  <!-- Eyebrows -->
  <path d="M78 78 Q86 74 92 78" stroke="#3a2a2a" stroke-width="1.5" fill="none"/>
  <path d="M108 78 Q114 74 122 78" stroke="#3a2a2a" stroke-width="1.5" fill="none"/>
  <!-- Eyes - larger feminine -->
  <ellipse cx="85" cy="84" rx="5.5" ry="4" fill="#2a1a0a"/>
  <circle cx="83" cy="83" r="1.5" fill="#fff" opacity="0.6"/>
  <ellipse cx="115" cy="84" rx="5.5" ry="4" fill="#2a1a0a"/>
  <circle cx="113" cy="83" r="1.5" fill="#fff" opacity="0.6"/>
  <!-- Eyelashes -->
  <path d="M79 80 L77 78" stroke="#2a1a0a" stroke-width="0.8"/>
  <path d="M121 80 L123 78" stroke="#2a1a0a" stroke-width="0.8"/>
  <!-- Nose -->
  <path d="M98 90 Q100 96 102 90" stroke="#d4b898" stroke-width="1.2" fill="none"/>
  <!-- Mouth - smile -->
  <path d="M92 104 Q100 109 108 104" stroke="#c07060" stroke-width="1.5" fill="none"/>
  <!-- Lips color -->
  <path d="M93 104 Q100 107 107 104" fill="#c07060" opacity="0.3"/>
  <!-- Top / modern collar -->
  <path d="M62 136 Q100 150 138 136" fill="#1a1035"/>
  <!-- Necklace -->
  <path d="M80 130 Q100 142 120 130" stroke="url(#gold3)" stroke-width="1" fill="none"/>
  <circle cx="100" cy="140" r="3" fill="url(#gold3)"/>
  <!-- Shoulders / top -->
  <path d="M44 150 Q100 175 156 150 L165 200 L35 200 Z" fill="#1a1035"/>
  <!-- Code decoration -->
  <text x="20" y="35" fill="#d4a853" opacity="0.35" font-size="11" font-family="monospace">&lt;/&gt;</text>
  <text x="160" y="40" fill="#d4a853" opacity="0.3" font-size="10" font-family="monospace">{}</text>
</svg>