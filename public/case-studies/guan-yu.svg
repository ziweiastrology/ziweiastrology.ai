<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a1f4e"/>
      <stop offset="100%" stop-color="#0f0a1f"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a853"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Head with warrior helmet -->
  <ellipse cx="100" cy="78" rx="34" ry="40" fill="#1a1035" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Helmet/headpiece -->
  <path d="M66 65 Q100 40 134 65" stroke="url(#gold)" stroke-width="2" fill="none"/>
  <path d="M100 40 L100 30" stroke="url(#gold)" stroke-width="2"/>
  <circle cx="100" cy="27" r="4" fill="url(#gold)" opacity="0.7"/>
  <!-- Long beard - iconic -->
  <path d="M85 100 Q90 140 95 155" stroke="url(#gold)" stroke-width="1.5" fill="none"/>
  <path d="M100 100 Q100 145 100 160" stroke="url(#gold)" stroke-width="2" fill="none"/>
  <path d="M115 100 Q110 140 105 155" stroke="url(#gold)" stroke-width="1.5" fill="none"/>
  <!-- Fierce eyes -->
  <line x1="78" y1="75" x2="92" y2="78" stroke="url(#gold)" stroke-width="2"/>
  <line x1="108" y1="78" x2="122" y2="75" stroke="url(#gold)" stroke-width="2"/>
  <!-- Green Dragon Crescent Blade (偃月刀) -->
  <line x1="155" y1="25" x2="160" y2="175" stroke="url(#gold)" stroke-width="2.5" opacity="0.6"/>
  <path d="M150 30 Q170 45 165 65 Q160 55 150 50 Z" fill="url(#gold)" opacity="0.4"/>
  <!-- Armor -->
  <path d="M66 118 Q100 135 134 118 L140 200 L60 200 Z" fill="#1a1035" stroke="url(#gold)" stroke-width="1"/>
  <!-- Stars -->
  <circle cx="30" cy="30" r="1.5" fill="#d4a853" opacity="0.7"/>
  <circle cx="25" cy="60" r="1" fill="#d4a853" opacity="0.5"/>
</svg>