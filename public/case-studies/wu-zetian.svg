<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a1f4e"/>
      <stop offset="100%" stop-color="#0f0a1f"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a853"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Face silhouette -->
  <ellipse cx="100" cy="82" rx="35" ry="42" fill="#1a1035" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Imperial crown (凤冠) -->
  <path d="M70 52 Q100 25 130 52" fill="#1a1035" stroke="url(#gold)" stroke-width="2"/>
  <!-- Crown ornaments - phoenix motif -->
  <path d="M85 38 L88 28 L91 38" stroke="url(#gold)" stroke-width="1.5" fill="none"/>
  <path d="M97 34 L100 22 L103 34" stroke="url(#gold)" stroke-width="1.5" fill="none"/>
  <path d="M109 38 L112 28 L115 38" stroke="url(#gold)" stroke-width="1.5" fill="none"/>
  <circle cx="100" cy="20" r="3" fill="url(#gold)" opacity="0.6"/>
  <circle cx="88" cy="26" r="2" fill="url(#gold)" opacity="0.4"/>
  <circle cx="112" cy="26" r="2" fill="url(#gold)" opacity="0.4"/>
  <!-- Dangling ornaments -->
  <line x1="72" y1="52" x2="68" y2="68" stroke="url(#gold)" stroke-width="1"/>
  <circle cx="68" cy="70" r="2" fill="url(#gold)" opacity="0.4"/>
  <line x1="128" y1="52" x2="132" y2="68" stroke="url(#gold)" stroke-width="1"/>
  <circle cx="132" cy="70" r="2" fill="url(#gold)" opacity="0.4"/>
  <!-- Commanding eyes -->
  <path d="M82 78 Q88 72 94 78" stroke="url(#gold)" stroke-width="2" fill="none"/>
  <path d="M106 78 Q112 72 118 78" stroke="url(#gold)" stroke-width="2" fill="none"/>
  <!-- Imperial robe -->
  <path d="M62 120 Q100 145 138 120 L150 200 L50 200 Z" fill="#1a1035" stroke="url(#gold)" stroke-width="1"/>
  <path d="M85 125 L100 160 L115 125" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Dragon emblem on robe -->
  <path d="M95 145 Q100 140 105 145 Q108 150 100 155 Q92 150 95 145" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <!-- Stars -->
  <circle cx="28" cy="30" r="1.5" fill="#d4a853" opacity="0.7"/>
  <circle cx="172" cy="28" r="1" fill="#d4a853" opacity="0.6"/>
</svg>